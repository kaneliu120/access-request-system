<div class="modal-overlay" id="stats-modal">
  <div class="modal" style="width:800px">

      <h2>统计报表</h2>

    </div>
    <div class="modal-body">
      <div class="filter-row">
        <div class="filter-group">
          <label>开始日期</label>
          <input type="date" id="stats-start-date">
        </div>
        <div class="filter-group">
          <label>结束日期</label>
          <input type="date" id="stats-end-date">
        </div>
        <div class="filter-group">
          <label>部门</label>
          <input type="text" id="stats-department" placeholder="部门筛选">
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button class="btn-filter" onclick="loadStats()">刷新统计</button>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid">
        <!-- 统计卡片将通过JS动态生成 -->
      </div>

      <div class="chart-placeholder">
        📊 统计图表区域 (未来可集成图表库)
      </div>

      <button class="btn-export" onclick="exportStats()">导出报表</button>
    </div>
  </div>
</div>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<script>
// ─── 配置 ─────────────────────────────────────────────────────
const API = window.location.origin;
let _token = localStorage.getItem('access_token');
let _user = JSON.parse(localStorage.getItem('user') || '{}');
let _currentFilter = 'all';
let _currentRequestId = null;
let _searchTimeout = null;
let _statsData = null;

// 角色标签映射
const roleLabels = {
  'requester': '普通用户',
  'approver_l1': 'L1 审批员',
  'approver_l2': 'L2 审批员',
  'admin': '管理员'
};

// 状态标签映射
const statusLabels = {
  'draft': '草稿',
  'pending_l1': '待 L1 审批',
  'pending_l2': '待 L2 审批',
  'approved': '已批准',
  'rejected': '已拒绝'
};

// 优先级标签映射
const priorityLabels = {
  'low': '低',
  'normal': '普通',
  'high': '高',
  'urgent': '紧急'
};

// ─── 初始化 ───────────────────────────────────────────────────
window.onload = initApp;

function initApp() {
  if (_token && _user.id) {
    showAppPage();
    loadUserInfo();
    loadRequests();
    loadStatsOverview();
  } else {
    showLoginPage();
  }
}

function showLoginPage() {
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('app-page').style.display = 'none';
}

function showAppPage() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'flex';
  updateUserDisplay();
}

// ─── 认证相关 ─────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');

  btn.disabled = true;
  btn.textContent = '登录中...';
  err.textContent = '';

  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '登录失败');

    _token = d.token;
    _user = d.user;
    localStorage.setItem('access_token', _token);
    localStorage.setItem('user', JSON.stringify(_user));

    showAppPage();
    loadUserInfo();
    loadRequests();
    loadStatsOverview();
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

function doLogout() {
  if (confirm('确定要退出登录吗？')) {
    _token = null;
    _user = {};
    localStorage.removeItem('access_token');
    localStorage.removeItem('user');
    showLoginPage();
  }
}

function authHeaders() {
  return {
    'Authorization': `Bearer ${_token}`,
    'Content-Type': 'application/json'
  };
}

// ─── 用户信息 ─────────────────────────────────────────────────
async function loadUserInfo() {
  try {
    const r = await fetch(`${API}/api/auth/me`, { headers: authHeaders() });
    const d = await r.json();
    if (r.ok && d.user) {
      _user = { ..._user, ...d.user };
      localStorage.setItem('user', JSON.stringify(_user));
      updateUserDisplay();
    }
  } catch (e) {
    console.error('加载用户信息失败:', e);
  }
}

function updateUserDisplay() {
  document.getElementById('user-name').textContent = _user.name || '用户';
  document.getElementById('user-avatar').textContent = (_user.name || 'U').charAt(0).toUpperCase();
  
  const roleBadge = document.getElementById('user-role');
  roleBadge.textContent = roleLabels[_user.role] || _user.role;
  roleBadge.className = `role-badge role-${_user.role}`;

  // 根据角色显示/隐藏功能按钮
  const isAdmin = _user.role === 'admin';
  const isApprover = _user.role?.includes('approver');
  document.getElementById('stats-btn').style.display = isAdmin || isApprover ? 'inline-block' : 'none';
  document.getElementById('export-btn').style.display = isAdmin ? 'inline-block' : 'none';
}

// ─── 申请管理 ─────────────────────────────────────────────────
async function loadRequests() {
  try {
    const params = new URLSearchParams();
    if (_currentFilter !== 'all') params.append('status', _currentFilter);
    
    // 添加高级筛选参数
    const startDate = document.getElementById('filter-start-date')?.value;
    const endDate = document.getElementById('filter-end-date')?.value;
    const requestType = document.getElementById('filter-request-type')?.value;
    const department = document.getElementById('filter-department')?.value;
    const search = document.getElementById('search-input')?.value;
    
    if (startDate) params.append('startDate', startDate);
    if (endDate) params.append('endDate', endDate);
    if (requestType) params.append('requestType', requestType);
    if (department) params.append('department', department);
    if (search) params.append('search', search);

    const r = await fetch(`${API}/api/requests?${params}`, { headers: authHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '加载失败');

    renderRequests(d.requests || []);
  } catch (e) {
    showToast('加载申请列表失败: ' + e.message, 'error');
  }
}

function renderRequests(requests) {
  const tbody = document.getElementById('requests-body');
  if (!requests.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="empty"><div class="empty-icon">📋</div>暂无申请记录</td></tr>`;
    return;
  }

  tbody.innerHTML = requests.map(r => `
    <tr>
      <td>#${r.id}</td>
      <td>
        <div style="font-weight:500">${r.requesterName}</div>
        <div style="font-size:.75rem;color:#888">${r.requesterEmail}</div>
      </td>
      <td>
        <div style="font-size:.8rem">${r.department || '未设置'}</div>
        <div style="font-size:.75rem;color:#888">${r.jobTitle || '未设置'}</div>
      </td>
      <td>${r.requestType}</td>
      <td>${r.targetResource}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.reason}">${r.reason}</td>
      <td>${r.durationDays}天</td>
      <td><span class="badge badge-priority-${r.priority || 'normal'}">${priorityLabels[r.priority] || '普通'}</span></td>
      <td><span class="badge badge-${r.status}">${statusLabels[r.status] || r.status}</span></td>
      <td style="white-space:nowrap">${new Date(r.createdAt).toLocaleDateString()}</td>
      <td>
        <div class="actions">
          <button class="btn-sm btn-view" onclick="viewRequest(${r.id})">查看</button>
          ${r.status === 'draft' && (r.requesterId === _user.id || _user.role === 'admin') ? `
            <button class="btn-sm btn-submit" onclick="submitExistingRequest(${r.id})">提交</button>
          ` : ''}
          ${r.status === 'pending_l1' && (_user.role === 'approver_l1' || _user.role === 'admin') ? `
            <button class="btn-sm btn-approve" onclick="openApprovalModal(${r.id}, 'L1')">审批</button>
          ` : ''}
          ${r.status === 'pending_l2' && (_user.role === 'approver_l2' || _user.role === 'admin') ? `
            <button class="btn-sm btn-approve" onclick="openApprovalModal(${r.id}, 'L2')">审批</button>
          ` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function setFilter(status) {
  _currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  loadRequests();
}

function debouncedSearch() {
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(() => loadRequests(), 300);
}

function toggleAdvancedFilters() {
  const filters = document.getElementById('advanced-filters');
  filters.style.display = filters.style.display === 'none' ? 'block' : 'none';
}

function applyAdvancedFilters() {
  loadRequests();
}

function resetAdvancedFilters() {
  document.getElementById('filter-start-date').value = '';
  document.getElementById('filter-end-date').value = '';
  document.getElementById('filter-request-type').value = '';
  document.getElementById('filter-department').value = '';
  loadRequests();
}

// ─── 新建申请 ─
